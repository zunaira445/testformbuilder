<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield/Badge shape -->
  <path d="M10 8 L10 8 Q10 6 12 6 L38 6 Q40 6 40 8 L40 32 Q40 46 25 52 Q10 46 10 32 Z"
        fill="url(#badgeGrad)" />

  <!-- White star / checkmark inside badge -->
  <path d="M25 14 L27.5 20 L34 20 L29 24.5 L31 31 L25 27 L19 31 L21 24.5 L16 20 L22.5 20 Z"
        fill="#ffffff" opacity="0.95"/>

  <!-- SWF text -->
  <text x="48" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="800"
        fill="url(#logoGrad)" letter-spacing="-0.5">SWF</text>

  <!-- PORTAL text -->
  <text x="49" y="44" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600"
        fill="#64748b" letter-spacing="3">PORTAL</text>

  <!-- Accent line -->
  <rect x="48" y="32" width="55" height="2" rx="1" fill="#0ea5e9" opacity="0.6"/>
</svg>